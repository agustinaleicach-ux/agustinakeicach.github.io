<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superior - Recursos Interactivos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #003B8F;
            --primary-medium: #1B5FB0;
            --primary-light: #00A8E1;
            --accent: #FF6B5B;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8f9fa;
        }

        header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%);
            color: var(--white);
            padding: 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.95;
        }

        main {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        .back-button {
            display: inline-block;
            margin-bottom: 2rem;
            padding: 0.7rem 1.5rem;
            background-color: var(--primary-medium);
            color: var(--white);
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
            font-weight: bold;
        }

        .back-button:hover {
            background-color: var(--primary-dark);
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .article-card {
            background: var(--white);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .article-image {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary-medium) 100%);
        }

        .article-content {
            padding: 1.5rem;
        }

        .article-content h3 {
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }

        .article-content p {
            color: #666;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .btn {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background-color: var(--accent);
            color: var(--white);
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
            font-weight: bold;
            border: none;
            cursor: pointer;
            margin-top: 1rem;
        }

        .btn:hover {
            background-color: #ff5542;
        }

        footer {
            background-color: var(--primary-dark);
            color: var(--white);
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>👑 Superior - Recursos Interactivos</h1>
        <p>Recursos educativos para estudiantes de nivel Superior</p>
    </header>

    <main>
        <a href="adultos-recursos.html" class="back-button">← Volver a ADULTOS</a>

        <div class="articles-grid">
            <div class="article-card">
                <div class="article-image">📖</div>
                <div class="article-content">
                    <h3>Taste and Other Tales</h3>
                    <p>Ejercicios y actividades basados en los cuentos de Roald Dahl. Penguin Readers.</p>
                    <a href="taste-other-tales-superior.pdf" class="btn" download>Descargar PDF →</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Instituto Cambridge - Comisiones</p>
    </footer>
</body>
</html>
