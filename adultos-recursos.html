<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADULTOS - Recursos Interactivos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #003B8F;
            --primary-medium: #1B5FB0;
            --primary-light: #00A8E1;
            --accent: #FF6B5B;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8f9fa;
        }

        header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%);
            color: var(--white);
            padding: 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.95;
        }

        main {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        .back-button {
            display: inline-block;
            margin-bottom: 2rem;
            padding: 0.7rem 1.5rem;
            background-color: var(--primary-medium);
            color: var(--white);
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
            font-weight: bold;
        }

        .back-button:hover {
            background-color: var(--primary-dark);
        }

        .coming-soon {
            text-align: center;
            padding: 3rem;
            background: var(--white);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .coming-soon h2 {
            font-size: 2rem;
            color: var(--primary-dark);
            margin-bottom: 1rem;
        }

        .coming-soon p {
            font-size: 1.1rem;
            color: #666;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        footer {
            background-color: var(--primary-dark);
            color: var(--white);
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>👨‍💼 ADULTOS - Recursos Interactivos</h1>
        <p>Recursos educativos para estudiantes de nivel Adultos</p>
    </header>

    <main>
        <a href="index.html#recursos" class="back-button">← Volver a Recursos</a>

        <div class="coming-soon">
            <div class="icon">⏳</div>
            <h2>Próximamente</h2>
            <p>Estamos preparando recursos interactivos para los niveles ADULTOS. Vuelve pronto para acceder a contenido educativo exclusivo.</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Instituto Cambridge - Comisiones</p>
    </footer>
</body>
</html>
